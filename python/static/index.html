<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Распределение заявок</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .none{
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <section class="section sectionMenu">
            <div class="container containerMenu">
                <a href="" class="link icon"><img class="image" src="/static/image/free-icon-insurance-14207142%20(1).png" alt=""></a>
                <a href="" class="link icon"><img class="image" src="/static/image/free-icon-history-2961948%20(1).png" alt=""></a>
                <a href="" class="link icon"><img class="image" src="/static/image/free-icon-characteristic-12885523%20(1).png" alt=""></a>
            </div>
        </section>
    </header>
    <main>
        <div class="">
            <section class="section sectionCard">
                <div class="container boxCard">
                    <div class="containerCard">
                        
                    </div>
                </div>
            </section>
        </div>
    </main>
    <footer>
        <!-- <a href="https://www.flaticon.com/ru/free-icons/" title="онлайн-заявка иконки">Онлайн-заявка иконки от Icon home - Flaticon</a> -->
    </footer>
    <script>
        let boxCard = document.querySelector(".containerCard")

        function createElem(elemName, textName, className){
            let elem = document.createElement(elemName)
            if(textName == undefined){
                textName = ""
            }else{
                elem.innerText = textName
            }
            if(className == undefined){
                className = ""
            }else{
                elem.classList.add(className)
            }
            return elem
        }
        function createForm(array, id){
            // Создание селекта и добавление имени
            let select = createElem('select')
            select.name = 'employee'
            for(let i = 0; i < array.length; i++){
                console.log(array[i].name)
                let op = createElem('option', array[i].name)
                console.log(array[i].code)
                op.value = array[i].code
                select.append(op)
            }
            // Создание скрытых метаданных с id заявки 
            let title = createElem('div', id, "none")
            // title.type = "text"
            title.name = "id"
            // Создание кнопки 
            input = createElem('input', se.description, "button")
            input.type = 'submit'
            // Создание формы
            let form = createElem('form')
            form.action = 'postdata'
            form.method = 'post'
            // Добавление созданных ранее тегов
            form.append(title)
            form.append(select)
            form.append(input)
            return form
        }
        function arrAddConflict(arr, users){
            for(let i = 0; i < arr.length; i++){
                let card = document.createElement('div')
                card.classList.add("card")
                se = arr[i]
                // let id = createElem('div', i+1, "none")
                // card.append(id)
                card.append(createElem('h1', se.title, "title"))
                card.append(createElem('p', se.description, "description"))
                card.append(createForm(users, i+1))
                boxCard.append(card)
            }
        }
        async function getCardInformation(){
            const responseCard = await fetch("/api/cards", {
                method: "GET",
                headers: { "Accept": "application/json" }
            });
            let cards
            if(responseCard){
                cards = await responseCard.json()
            }
            let responseUsers = await fetch("/api/users",{
                method: "GET",
                headers: { "Accept": "application/json" }
            })
            let users
            if(responseUsers){
                users = await responseUsers.json()
            }
            arrAddConflict(cards, users)
        }
        // getTasks()
        // getUsers().then(response => {
        //     let cards = document.querySelectorAll(".card")
        //     // .append(createSelectOption(response))
        //     cards.forEach(el => el.append(createForm(response)))
        // })
        // let elements = document.querySelectorAll(".card")
        // // .append(createSelectOption(response))
        // elements.forEach(el => console.log(el))
        // console.log(getUsers())
        getCardInformation()
        const responseCard = fetch("/test", {
            method: "POST",
            headers: { "Accept": "application/json" },
            body: JSON.stringify({
                "id": 1,
                "employee": "hr"
            })
        });
    </script>
</body>
</html>
