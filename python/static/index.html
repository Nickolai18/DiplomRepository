        let boxCard = document.querySelector(".containerCard")

        function createElem(elemName, textName, className){
            let elem = document.createElement(elemName)
            elem.innerText = textName
            elem.classList.add(className)
            return elem
        }
        function createSelectOption(array){
            let select = createElem('select', 0)
            select.id = 'country'
            select.name = 'country'
            for(let i = 0; i < array.length; i++){
                console.log(array[i].name)
                let op = createElem('option', array[i].name)
                console.log(array[i].code)
                op.value = array[i].code
                select.append(op)
            }
            let form = createElem('form', 0)
            form.action = 'postdata'
            form.method = 'post'
            form.append(select)
            return form
        }
        function arrAddConflict(arr, users){
            for(let i = 0; i < arr.length; i++){
<!--                console.log(arr[i])-->
<!--                console.log(arr[i].title)-->
                let card = document.createElement('div')
                card.classList.add("card")
                se = arr[i]
                let id = createElem('div', i+1, "none")
                card.append(id)
                card.append(createElem('h1', se.title, "title"))
                card.append(createElem('p', se.description, "description"))
                card.append(createSelectOption(users))
                console.log(users)
                boxCard.append(card)
            }
        }
