        function createElem(elemName, textName, className){
            let elem = document.createElement(elemName)
            if(textName == undefined){
                textName = ""
            }else{
                elem.innerText = textName
            }
            if(className == undefined){
                className = ""
            }else{
                elem.classList.add(className)
            }
            return elem
        }
        function createForm(array, id){
            // Создание селекта и добавление имени
            let select = createElem('select')
            select.name = 'employee'
            let op = createElem('option', 'Автоматически')
            op.value = 'auto'
            select.append(op)
            for(let i = 0; i < array.length; i++){
                console.log(array[i].name)
                let op = createElem('option', array[i].name)
                console.log(array[i].code)
                op.value = array[i].code
                select.append(op)
            }
            // Создание скрытых метаданных с id заявки 
            let title = createElem('input', id, "none")
            title.type = "text"
            title.name = "id"
            title.value = id
            // Создание кнопки 
            input = createElem('input', se.description, "button")
            input.type = 'submit'
            // Создание формы
            let form = createElem('form')
            form.action = '/'
            form.method = 'post'
            // Добавление созданных ранее тегов
            form.append(title)
            form.append(select)
            form.append(input)
            return form
        }
        function arrAddConflict(arr, users){
            for(let i = 0; i < arr.length; i++){
                let card = document.createElement('div')
                card.classList.add("card")
                let marker = createElem("div", undefined, "marker")
                let wingLeft = createElem("div", undefined, "wing")
                let wingRight = createElem("div", undefined, "wing")
                wingLeft.classList.add("wingLeft")
                wingRight.classList.add("wingRight")
                se = arr[i]
                // let id = createElem('div', i+1, "none")
                // card.append(id)
                if(se.critical == 2){
                    marker.classList.add("marker-critical-2")
                    wingLeft.classList.add("marker-critical-2")
                    wingRight.classList.add("marker-critical-2")
                    marker.append(wingLeft)
                    marker.append(wingRight)
                    if(se["secondary_employee"] == ''){
                        marker.classList.add('plus')
                    }
                    card.append(marker)
                }else if(se.critical == 1){
                    marker.classList.add("marker-critical-1")
                    wingLeft.classList.add("marker-critical-1")
                    wingRight.classList.add("marker-critical-1")
                    marker.append(wingLeft)
                    marker.append(wingRight)
                    if(se["secondary_employee"] == ''){
                        marker.classList.add('plus')
                    }
                    card.append(marker)
                }

                card.append(createElem('h1', se.title, "title"))
                card.append(createElem('p', se.description, "description"))
                card.append(createForm(users, se.id))
                boxCard.append(card)
            }
        }

            let users

                users = await responseUsers.json()
            }
            arrAddConflict(cards, users)
        }
