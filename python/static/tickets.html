<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Актуальные заявки</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .none{
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <section class="section sectionMenu">
            <div class="container containerMenu">
                <a href="/" class="link icon"><img class="image" src="/static/image/free-icon-insurance-14207142%20(1).png" alt=""></a>
                <a href="/tickets" class="link icon"><img class="image" src="/static/image/free-icon-characteristic-12885523%20(1).png" alt=""></a>
                <a href="/analise" class="link icon"><img class="image" src="/static/image/free-icon-history-2961948%20(1).png" alt=""></a>
            </div>
        </section>
    </header>
    <main>
        <div class="">
            <section class="section sectionCard">
                <div class="container boxTickets">

                    </div>
                </div>
            </section>
        </div>
    </main>
    <footer>
        <!-- <a href="https://www.flaticon.com/ru/free-icons/" title="онлайн-заявка иконки">Онлайн-заявка иконки от Icon home - Flaticon</a> -->
    </footer>
    <script>
        function createElem(elemName, textName, className){
            let elem = document.createElement(elemName)
            if(textName == undefined){
                textName = ""
            }else{
                elem.innerText = textName
            }
            if(className == undefined){
                className = ""
            }else{
                elem.classList.add(className)
            }
            return elem
        }
        
        async function getTicketsInProgressInformation(){
            const responseTicket = await fetch("/api/tickets", {
                method: "GET",
                headers: { "Accept": "application/json" }
            });
            let cards
            if(responseTicket){
                tickets = await responseTicket.json()
            }
            let responseUsers = await fetch("/api/users",{
                method: "GET",
                headers: { "Accept": "application/json" }
            })
            let users
            if(responseUsers){
                users = await responseUsers.json()
            }
            let responseEmployee = await fetch("/api/employee",{
                method: "GET",
                headers: { "Accept": "application/json" }
            })
            let employee
            if(responseEmployee){
                employee = await responseEmployee.json()
            }
            createUsersTicket(users, employee, tickets)
        }

        let boxTicket = document.querySelector(".boxTickets")

        function createForm(id, method, action, value){
            // Создание скрытых метаданных с id заявки 
            let title = createElem('input', id, "none")
            title.type = "text"
            title.name = "id"
            title.value = id
            // Создание кнопки 
            input = createElem('input', undefined, "button")
            input.type = 'submit'
            input.value = value
            // Создание формы
            let form = createElem('form')
            form.action = action
            form.method = method
            // Добавление созданных ранее тегов
            form.append(title)
            form.append(input)
            return form
        }

        function createUsersTicket(arrayUsers, arrayEmployee, arrayTickets){
            console.log(arrayUsers)
            console.log(arrayEmployee)
            console.log(arrayTickets)
            for(let user of arrayUsers){
                let line = createElem("div", undefined, "line")
                let contTickets = createElem("div", undefined, "containerTickets")
                let boxUser = createElem("div", undefined, "boxUser")
                let boxImage = createElem("div", undefined, "boxImage")
                let cardTicketUser = createElem("div", undefined, "card")
                cardTicketUser.classList.add("cardUser")
                let imageUser = document.createElement("img")
                imageUser.classList.add("image") 
                imageUser.classList.add("imageCard") 
                imageUser.src = "/static/image/user.png"
                let titleUser = createElem("p", user["name"] + " " + user["surname"], "title")
                titleUser.classList.add("titleCard") 
                let number_of_calls = user["current_calls"]
                number_of_calls = "Количество заявок: " + number_of_calls
                let tickets = createElem("p", number_of_calls, "tickets")

                boxImage.append(imageUser)

                cardTicketUser.append(boxImage)
                cardTicketUser.append(titleUser)
                cardTicketUser.append(tickets)

                boxUser.append(cardTicketUser)
                console.log(1)

                let boxTick = createElem("div", undefined, "boxTick")
                
                for(let ticket of arrayTickets){
                    let employeeCode = user["code"]
                    // for(let emplo of arrayEmployee){
                    //     if(emplo['id_users'] = user["id"]){
                    //         employeeCode = emplo['code']
                    //         break
                    //     }
                    // }
                    if(ticket["employee"] == employeeCode){
                        console.log(user["code"])
                        console.log(ticket["code"])
                        let cardTicket = createElem("div", undefined, "card")
                        cardTicket.classList.add("cardTicket")
                        let numberAud = createElem("span", ticket["title"], "numberAud")
                        let describtion = createElem("div", ticket["description"], "describtion")
                        let boxForm = createElem("div", undefined, "boxForm")
                        let boxFormComplete = createElem("div", undefined, "boxForm")
                        let marker = createElem("div", undefined, "marker")
                        let wingLeft = createElem("div", undefined, "wing")
                        let wingRight = createElem("div", undefined, "wing")
                        wingLeft.classList.add("wingLeft")
                        wingRight.classList.add("wingRight")
                        if(ticket["critical"] == 1){
                            marker.classList.add("marker-critical-1")
                            wingLeft.classList.add("marker-critical-1")
                            wingRight.classList.add("marker-critical-1")
                        }
                        if(ticket["critical"] == 2){
                            marker.classList.add("marker-critical-2")
                            wingLeft.classList.add("marker-critical-2")
                            wingRight.classList.add("marker-critical-2")
                        }
                        marker.append(wingLeft)
                        marker.append(wingRight)

                        console.log(ticket["secondary_employee"])
                        if(ticket["secondary_employee"] == null){
                        }else{
                            marker.classList.add('plus')
                        }

                        console.log(ticket["id"])

                        boxForm.append(createForm(ticket["id"], 'post', '/tickets', 'Изменить сотрудника'))
                        boxForm.append(createForm(ticket["id"], 'post', '/tickets/addnewuser', 'Добавить сотрудника'))
                        boxFormComplete.append(createForm(ticket["id"], 'post', '/complete_tickets', 'Завершить заявку'))

                        cardTicket.append(numberAud)
                        cardTicket.append(describtion)
                        cardTicket.append(marker)
                        cardTicket.append(boxForm)
                        cardTicket.append(boxFormComplete)
                        
                        if(ticket["critical"] != 0){
                            boxTick.prepend(cardTicket)
                        }else{
                            boxTick.append(cardTicket)
                        }
                    }
                    else{
                        console.log('No')
                        continue
                    }
                }

                contTickets.append(boxUser)
                contTickets.append(boxTick)
                contTickets.before(line)

                boxTicket.append(contTickets)

            }
        }
        getTicketsInProgressInformation()
    </script>
</body>
</html>
